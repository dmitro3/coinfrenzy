<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #fff;
        }
        .gate {
            width: 100%;
            max-width: 380px;
            padding: 2.5rem 2rem;
            margin: 1rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
        }
        .gate h1 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #d4a855;
            margin-bottom: 0.4rem;
        }
        .gate p {
            font-size: 0.82rem;
            color: #666;
            margin-bottom: 1.6rem;
        }
        .gate input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .gate input:focus {
            border-color: rgba(212,168,85,0.5);
        }
        .gate button {
            width: 100%;
            margin-top: 1rem;
            padding: 14px;
            background: linear-gradient(135deg, #d4a855, #b8944a);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .gate button:hover { opacity: 0.9; }
        .gate button:disabled { opacity: 0.5; cursor: default; }
        .error {
            margin-top: 1rem;
            padding: 10px 14px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 8px;
            color: #ef4444;
            font-size: 0.82rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="gate">
        <h1>Admin Access</h1>
        <p>Enter the admin password to continue.</p>
        <form id="gate-form">
            <input type="password" id="gate-pw" placeholder="Password" autocomplete="off" autofocus required>
            <button type="submit" id="gate-btn">Continue</button>
        </form>
        <div class="error" id="gate-error"></div>
    </div>
    <script>
        document.getElementById('gate-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var btn = document.getElementById('gate-btn');
            var errEl = document.getElementById('gate-error');
            var pw = document.getElementById('gate-pw').value;
            if (!pw) return;
            btn.disabled = true;
            btn.textContent = 'Verifying...';
            errEl.style.display = 'none';
            try {
                var res = await fetch('/api/admin/gate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pw })
                });
                var data = await res.json().catch(function() { return {}; });
                if (res.ok) {
                    window.location.href = '/admin';
                } else {
                    errEl.textContent = data.error || 'Invalid password.';
                    errEl.style.display = 'block';
                }
            } catch (err) {
                errEl.textContent = 'Connection error. Try again.';
                errEl.style.display = 'block';
            }
            btn.disabled = false;
            btn.textContent = 'Continue';
        });
    </script>
    <script src="/env-banner.js"></script>
</body>
</html>
